apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: pulse-alerts
  namespace: pulse-infra
  labels:
    release: monitoring
spec:
  groups:
    - name: pulse.rules
      rules:
        - alert: HighErrorRate
          expr: sum(rate(http_requests_total{status=~"5.."}[5m])) by (job) > 0.05
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "High error rate on {{ $labels.job }}"
            description: "{{ $labels.job }} has more than 5% error rate for 2 minutes"

        - alert: HighLatency
          expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, job)) > 2
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "High latency on {{ $labels.job }}"
            description: "{{ $labels.job }} p95 latency is above 2 seconds"

        - alert: PodRestarting
          expr: increase(kube_pod_container_status_restarts_total{namespace="pulse-app"}[10m]) > 3
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} is restarting frequently"
            description: "{{ $labels.pod }} has restarted more than 3 times in 10 minutes"

        - alert: ServiceDown
          expr: up{namespace="pulse-app"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "{{ $labels.job }} is down"
            description: "{{ $labels.job }} has been unreachable for 1 minute"
